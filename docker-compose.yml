services:
  postgres:
    image: postgres:16-alpine
    container_name: adr-postgres
    environment:
      POSTGRES_DB: adr_extraction
      POSTGRES_USER: adr_user
      POSTGRES_PASSWORD: adr_password_dev
    ports:
      - "5432:5432"
    volumes:
      - ./volume/db:/var/lib/postgresql/data
      - ./prisma/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adr_user -d adr_extraction"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - adr-network

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-}
        NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-}
        NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-}
    container_name: adr-nextjs
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://adr_user:adr_password_dev@postgres:5432/adr_extraction
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: adr_user
      DB_PASSWORD: adr_password_dev
      DB_NAME: adr_extraction
      DATASETS_PATH: /app/datasets
      CHANGELOG_PATH: /app/data/changelog
      EXECUTIONS_PATH: /app/executions
      GROUND_TRUTH_PATH: /app/ground-truth
    ports:
      - "3000:3000"
    volumes:
      - ./volume/datasets:/app/datasets:ro
      - ./volume/changelog:/app/data/changelog
      - ./volume/executions:/app/executions
      - ./volume/ground-truth:/app/ground-truth
    networks:
      - adr-network

networks:
  adr-network:
    driver: bridge

# Notes:
# - All persistent data lives under a single host folder, ./volume, so it's
#   easy to inspect/back up as one unit (Postgres's data directory is not a
#   named Docker volume — it's just another bind-mounted subfolder):
#   - ./volume/db: Postgres data directory
#   - ./volume/datasets: PDFs for each dataset, one subfolder per radicado (read-only)
#   - ./volume/executions: Execution history written by the app
#   - ./volume/changelog: Markdown files for changelog versions
#   - ./volume/ground-truth: Reviewer-fixed field values, one JSON file per document
#
# - The `nextjs` service applies the Prisma schema (`prisma db push`) automatically
#   on container startup via docker-entrypoint.sh, then starts the app.
#
# - NEXT_PUBLIC_* Keycloak vars are baked in at build time. They're read from the
#   shell/.env.local via compose variable interpolation, so build them with:
#     docker compose --env-file .env.local up --build
#
# To start everything:
#   docker compose --env-file .env.local up --build
